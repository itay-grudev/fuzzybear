name: Tests
on: [ push ]
jobs:
  build:
    strategy:
      matrix:
        node_version: [22, 24, 26]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install NodeJS
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node_version }}

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm audit
